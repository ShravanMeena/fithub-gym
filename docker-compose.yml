# Production stack on GCP:
#   api            -> FitHub backend (Node)
#   cloudsql-proxy -> secure tunnel to Cloud SQL (PostgreSQL) using the VM's service account
#   caddy          -> automatic HTTPS
# Data lives in Cloud SQL + the GCS bucket (nothing on local disk).
services:
  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
    restart: always
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${CLOUD_SQL_CONNECTION}"
    expose:
      - "5432"

  api:
    build: .
    restart: always
    env_file: .env.production
    environment:
      - PGHOST=cloudsql-proxy
      - PGPORT=5432
    expose:
      - "4000"
    depends_on:
      - cloudsql-proxy

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
