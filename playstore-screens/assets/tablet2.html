<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:2560px;height:1600px;overflow:hidden}
  body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:
      radial-gradient(1400px 900px at 50% -10%, rgba(255,90,31,0.22), transparent 60%),
      linear-gradient(135deg,#0E0F13 0%,#16181f 100%);
    color:#fff;display:flex;flex-direction:column;align-items:center;padding:70px 0}
  .tag{font-size:46px;font-weight:900;text-align:center}
  .sub{font-size:24px;color:#9AA0AC;font-weight:700;margin-top:12px;margin-bottom:50px}
  .row{display:flex;gap:48px;align-items:flex-start;justify-content:center}
  .phone{width:600px;border-radius:42px;overflow:hidden;border:10px solid #23262E;
    box-shadow:0 40px 90px rgba(0,0,0,0.55)}
  .phone img{width:100%;display:block}
  .cap{font-size:24px;font-weight:800;text-align:center;margin-top:22px}
  .col{display:flex;flex-direction:column;align-items:center}
  .col.up{transform:translateY(-30px)}
</style></head><body>
  <div class="tag">Eat right & stay connected</div>
  <div class="sub">Personalised diet targets, progress charts and your gym community</div>
  <div class="row">
    <div class="col"><div class="phone"><img src="04-diet.png"></div><div class="cap">🍽️ Smart diet plans</div></div>
    <div class="col up"><div class="phone"><img src="07-progress.png"></div><div class="cap">📈 See real progress</div></div>
    <div class="col"><div class="phone"><img src="06-community.png"></div><div class="cap">💬 Your gym community</div></div>
  </div>
</body></html>
