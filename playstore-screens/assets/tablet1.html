<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:2560px;height:1600px;overflow:hidden}
  body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:
      radial-gradient(1400px 900px at 50% -10%, rgba(255,90,31,0.22), transparent 60%),
      linear-gradient(135deg,#0E0F13 0%,#16181f 100%);
    color:#fff;display:flex;flex-direction:column;align-items:center;padding:70px 0}
  .brandrow{display:flex;align-items:center;gap:16px;margin-bottom:8px}
  .brandrow svg{width:52px;height:52px}
  .brand{font-size:52px;font-weight:900;letter-spacing:-1px}
  .brand .h{color:#FF5A1F}
  .tag{font-size:40px;font-weight:900;text-align:center;margin-top:6px}
  .sub{font-size:24px;color:#9AA0AC;font-weight:700;margin-top:10px;margin-bottom:46px}
  .row{display:flex;gap:48px;align-items:flex-start;justify-content:center}
  .phone{width:600px;border-radius:42px;overflow:hidden;border:10px solid #23262E;
    box-shadow:0 40px 90px rgba(0,0,0,0.55)}
  .phone img{width:100%;display:block}
  .cap{font-size:24px;font-weight:800;text-align:center;margin-top:22px;color:#fff}
  .col{display:flex;flex-direction:column;align-items:center}
  .col.up{transform:translateY(-30px)}
</style></head><body>
  <div class="brandrow">
    <svg viewBox="0 0 100 100"><rect x="26" y="45" width="48" height="10" rx="5" fill="#FF5A1F"/><rect x="17" y="34" width="10" height="32" rx="4" fill="#FF5A1F"/><rect x="8" y="40" width="8" height="20" rx="4" fill="#FF7A3F"/><rect x="73" y="34" width="10" height="32" rx="4" fill="#FF5A1F"/><rect x="84" y="40" width="8" height="20" rx="4" fill="#FF7A3F"/></svg>
    <div class="brand">Fit<span class="h">Hub</span></div>
  </div>
  <div class="tag">Show up. Eat right. Stay strong.</div>
  <div class="sub">Your gym membership, leveled up — streaks, diet & community in one app</div>
  <div class="row">
    <div class="col"><div class="phone"><img src="03-today.png"></div><div class="cap">🔥 Build your streak</div></div>
    <div class="col up"><div class="phone"><img src="08-scan.png"></div><div class="cap">🥗 Log meals in seconds</div></div>
    <div class="col"><div class="phone"><img src="09-leaderboard.png"></div><div class="cap">🏆 Climb the leaderboard</div></div>
  </div>
</body></html>
