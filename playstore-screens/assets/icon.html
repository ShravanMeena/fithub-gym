<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:512px; height:512px; overflow:hidden; }
  body {
    background:
      radial-gradient(420px 420px at 50% 36%, rgba(255,90,31,0.30), transparent 62%),
      linear-gradient(135deg,#16181f 0%,#0E0F13 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .badge {
    width:512px; height:512px; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:18px;
  }
  svg { width:300px; height:300px; filter:drop-shadow(0 18px 40px rgba(255,90,31,0.45)); }
  .name { color:#fff; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    font-weight:900; font-size:62px; letter-spacing:-1px; }
  .name .h { color:#FF5A1F; }
</style></head><body>
  <div class="badge">
    <svg viewBox="0 0 100 100">
      <rect x="24" y="44" width="52" height="12" rx="6" fill="#FF5A1F"/>
      <rect x="14" y="31" width="12" height="38" rx="5" fill="#FF5A1F"/>
      <rect x="3" y="38" width="9" height="24" rx="4" fill="#FF7A3F"/>
      <rect x="74" y="31" width="12" height="38" rx="5" fill="#FF5A1F"/>
      <rect x="88" y="38" width="9" height="24" rx="4" fill="#FF7A3F"/>
    </svg>
    <div class="name">Fit<span class="h">Hub</span></div>
  </div>
</body></html>
